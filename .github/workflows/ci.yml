name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Backend tests with coverage gate
        run: .\mvnw.cmd verify
        working-directory: backend
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
      - name: Verify backend coverage report exists
        run: |
          if (!(Test-Path "backend/target/site/jacoco/index.html")) { throw "Missing backend coverage report" }

  frontend:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Frontend build
        run: npm run build
        working-directory: frontend
      - name: Frontend tests with coverage gate
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
      - name: Verify frontend coverage report exists
        run: |
          if (!(Test-Path "frontend/coverage/index.html")) { throw "Missing frontend coverage report" }
      - name: Upload ops runbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-runbook
          path: docs/ops-runbook.md
