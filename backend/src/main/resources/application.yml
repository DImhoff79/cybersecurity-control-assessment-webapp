spring:
  application:
    name: cybersecurity-assessment
  datasource:
    url: jdbc:h2:file:./data/assessment;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 3025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
server:
  port: 8080

# CORS allowed origins (Vue dev server)
app:
  cors-allowed-origins: http://localhost:5173,http://localhost:3000
  frontend-base-url: http://localhost:5173
  evidence-storage-path: ./data/evidence
  evidence-policy:
    min-description-length: 8
    max-file-size-bytes: 10485760
    allowed-content-types: application/pdf,text/plain,image/png,image/jpeg,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv
    retention-days: 365
    reminder-days-before-expiry: 14
  automation:
    enabled: true
    reminder-days-before-due: 3
