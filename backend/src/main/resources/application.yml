spring:
  application:
    name: cybersecurity-assessment
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/assessment;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
  flyway:
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=5m,recordStats
  task:
    execution:
      thread-name-prefix: assessment-async-
      pool:
        core-size: 4
        max-size: 12
        queue-capacity: 500
      shutdown:
        await-termination: true
        await-termination-period: 30s
  mail:
    host: localhost
    port: 3025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: cybersecurity-assessment
  observations:
    key-values:
      app: cybersecurity-assessment

# CORS allowed origins (Vue dev server)
app:
  auth:
    mode: ${APP_AUTH_MODE:mixed}
    allow-basic: ${APP_AUTH_ALLOW_BASIC:true}
    seed-local-users: ${APP_AUTH_SEED_LOCAL_USERS:true}
  seed:
    demo-dataset: ${APP_SEED_DEMO_DATASET:true}
    test-policies: ${APP_SEED_TEST_POLICIES:true}
    test-policies-refresh: ${APP_SEED_TEST_POLICIES_REFRESH:true}
  cors-allowed-origins: http://localhost:5173,http://localhost:3000
  frontend-base-url: http://localhost:5173
  evidence-storage-path: ./data/evidence
  evidence-storage-mode: ${EVIDENCE_STORAGE_MODE:db}
  evidence-policy:
    min-description-length: 8
    max-file-size-bytes: 10485760
    allowed-content-types: application/pdf,text/plain,image/png,image/jpeg,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv
    default-valid-days: 365
    retention-days: 365
    reminder-days-before-expiry: 14
    archive-grace-days: 30
    disposal-grace-days: 30
  automation:
    enabled: true
    reminder-days-before-due: 3
  remediation:
    reminder-min-hours-between: 24
    escalation-days-overdue: 7
  scalability:
    slos:
      api-p95-ms: 350
      api-error-rate-pct: 1.0
      report-generation-p95-ms: 4000
      evidence-upload-p95-ms: 2500
