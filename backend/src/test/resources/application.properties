# Ensure MailSenderAutoConfiguration runs in @SpringBootTest (spring.mail.host must be present in the Environment).
spring.mail.host=localhost
# Integration tests expect the legacy "all enabled controls" audit seed (small NIST subset in fixtures).
app.audit.new-audit-framework=
# Avoid inserting thousands of demo audit_control_answers rows during @SpringBootTest (slow, unnecessary).
app.seed.demo-assessment-answers=false
